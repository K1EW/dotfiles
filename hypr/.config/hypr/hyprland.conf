$mainMod = SUPER
$terminal = kitty

exec-once = nm-applet --indicator
exec-once = waybar
exec-once = hyprpaper

source = ~/.config/hypr/monitors.conf

input {
	touchpad {
		natural_scroll = true
	}
    kb_layout = us,th
}

cursor {
	no_warps = true
}

device {
    name = 2.4g-mouse
    sensitivity = 0
}

device {
    name = 2.4g-mouse-1
    sensitivity = 0
}

animations {
	enabled = true
	bezier = snappy, 0.1, 1, 0.1, 1
	animation = windows, 1, 2, snappy, slide
	animation = windowsOut, 1, 2, snappy, slide
	animation = border, 1, 2, default
	animation = fade, 1, 2, default
	animation = workspaces, 1, 2, snappy, slide
}

general {
	gaps_in = 3
	gaps_out = 3
}

decoration {
	rounding = 5
}

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, W, exec, killall waybar && waybar
bind = $mainMod, space, exec, hyprctl switchxkblayout current next
bind = $mainMod SHIFT, Q, killactive,

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod SHIFT, F, togglefloating,
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, mouse:272, movewindow

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
